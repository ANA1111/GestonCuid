<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GestonCuid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">GestonCuid</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <!-- Link para Staff e Admin -->
                    <a class="nav-link" href="{% url 'dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    
                    <!-- Link apenas para Superusuário -->
                    {% if user.is_superuser %}
                        <a class="nav-link" href="{% url 'lista' %}"><i class="bi bi-people"></i> Lista</a>
                        <a class="nav-link text-success" href="{% url 'exportar_excel' %}"><i class="bi bi-file-earmark-excel"></i> Exportar</a>
                    {% endif %}
                    
                    <a class="nav-link text-danger" href="/admin/logout/">Sair</a>
                {% else %}
                    <a class="nav-link" href="/admin/login/">Entrar (Equipe)</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
