{% extends 'cuidadores/base.html' %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    .card-cadastro { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
    .header-cadastro { background: linear-gradient(135deg, #0d6efd 0%, #0046af 100%); padding: 30px; color: white; text-align: center; }
    .section-title { 
        background: #eef4ff; color: #0d6efd; padding: 10px 15px; border-radius: 8px; 
        font-weight: 700; margin-top: 25px; margin-bottom: 15px; font-size: 0.8rem;
        text-transform: uppercase; display: flex; align-items: center;
    }
    .section-title i { margin-right: 8px; }
    .form-label { font-weight: 600; color: #495057; }
    .btn-enviar { padding: 15px; font-weight: bold; border-radius: 10px; margin-top: 25px; transition: 0.3s; }
    .btn-enviar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3); }
    .file-upload-wrapper { border: 2px dashed #dee2e6; border-radius: 10px; padding: 20px; text-align: center; background: #fff; }
</style>

<div class="container py-5">
    <div class="card card-cadastro mx-auto" style="max-width: 800px;">
        <div class="header-cadastro">
            <h3 class="fw-bold mb-1">Inscrição de Profissional</h3>
            <p class="mb-0 small">Preencha todos os campos para análise técnica.</p>
        </div>
        
        <div class="card-body p-4 p-md-5">
            <!-- CRÍTICO: O enctype="multipart/form-data" permite o envio de arquivos -->
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- IDENTIFICAÇÃO -->
                <div class="section-title"><i class="bi bi-person-badge"></i> Dados Básicos</div>
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">WhatsApp</label>
                        <input type="text" name="whatsapp" class="form-control" placeholder="DDD + Número" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                </div>

                <!-- LOCALIZAÇÃO -->
                <div class="section-title"><i class="bi bi-geo-alt"></i> Localização</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Estado</label>
                        <select id="estado" name="estado" class="form-select" required><option value="">Selecione...</option></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Cidade</label>
                        <select id="cidade" name="cidade" class="form-select" required disabled><option value="">Selecione o estado...</option></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Bairro</label>
                        <input type="text" name="bairro" class="form-control" required>
                    </div>
                </div>

                <!-- QUALIFICAÇÃO -->
                <div class="section-title"><i class="bi bi-mortarboard"></i> Qualificação Profissional</div>
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label">Formação Principal</label>
                        <select name="formacao" class="form-select" required>
                            <option value="Curso Cuidador (>80h)">Curso de Cuidador de Idosos</option>
                            <option value="Técnico/Aux Enfermagem">Técnico/Auxiliar de Enfermagem</option>
                            <option value="Experiência Prática">Experiência Prática</option>
                        </select>
                    </div>
                </div>

                <!-- CURRÍCULO (NOVO CAMPO) -->
                <div class="section-title"><i class="bi bi-file-earmark-pdf"></i> Currículo Atualizado</div>
                <div class="file-upload-wrapper">
                    <label class="form-label d-block mb-2">Anexe seu currículo (PDF, JPG ou PNG)</label>
                    <input type="file" name="curriculo" class="form-control" accept=".pdf,.jpg,.png,.docx" required>
                    <small class="text-muted d-block mt-2">Tamanho máximo recomendado: 5MB</small>
                </div>

                <button type="submit" class="btn btn-primary btn-enviar w-100 shadow">
                    CONCLUIR INSCRIÇÃO <i class="bi bi-check2-circle ms-2"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const estadoSelect = document.getElementById('estado');
    const cidadeSelect = document.getElementById('cidade');

    // API IBGE
    fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome')
        .then(res => res.json())
        .then(data => {
            data.forEach(uf => {
                estadoSelect.innerHTML += `<option value="${uf.sigla}">${uf.nome}</option>`;
            });
        });

    estadoSelect.addEventListener('change', () => {
        const uf = estadoSelect.value;
        cidadeSelect.innerHTML = '<option value="">Carregando...</option>';
        cidadeSelect.disabled = true;
        if (uf) {
            fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`)
                .then(res => res.json())
                .then(data => {
                    cidadeSelect.innerHTML = '<option value="">Selecione a Cidade</option>';
                    data.forEach(c => cidadeSelect.innerHTML += `<option value="${c.nome}">${c.nome}</option>`);
                    cidadeSelect.disabled = false;
                });
        }
    });
</script>
{% endblock %}
